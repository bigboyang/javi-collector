version: "3.9"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "9000:9000"   # native protocol
      - "8123:8123"   # HTTP interface
    environment:
      CLICKHOUSE_DB: apm
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  collector:
    build: .
    ports:
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP + REST API
    environment:
      GRPC_PORT: "4317"
      HTTP_PORT: "4318"
      CLICKHOUSE_ADDR: "clickhouse:9000"
      CLICKHOUSE_DB: "apm"
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_PASSWORD: ""
      BATCH_SIZE: "1000"
      FLUSH_INTERVAL: "2s"
      CHANNEL_BUFFER_SIZE: "8192"
      DISABLE_CLICKHOUSE: "false"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clickhouse-data:
