apiVersion: apps/v1
kind: Deployment
metadata:
  name: javi-config-server
  namespace: apm
spec:
  template:
    spec:
      containers:
        - name: config-server
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
