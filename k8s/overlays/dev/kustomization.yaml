apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev: single replicas, ephemeral storage, reduced resources
# Deploy: kubectl apply -k k8s/overlays/dev

namespace: apm

resources:
  - ../../base

patches:
  - path: patches/dev-collector.yaml
  - path: patches/dev-forecast.yaml
  - path: patches/dev-config-server.yaml
  - path: patches/dev-dashboard.yaml
  - path: patches/dev-redis.yaml
