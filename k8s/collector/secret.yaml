apiVersion: v1
kind: Secret
metadata:
  name: collector-secret
  namespace: apm
type: Opaque
stringData:
  # ClickHouse 비밀번호 (clickhouse-secret의 password와 반드시 동일하게 유지)
  CLICKHOUSE_PASSWORD: "changeme-use-sealed-secrets"

  # Collector REST API 인증 키 (X-API-Key 헤더)
  # 운영: openssl rand -base64 32 로 생성 후 sealed-secrets로 관리
  API_KEY: "changeme-collector-api-key"

  # Alert 설정 (선택 사항)
  ALERT_WEBHOOK_URL: ""
  ALERT_SLACK_WEBHOOK_URL: ""

  # RAG 설정 (collector가 직접 사용: embed → Qdrant 적재, RCA 유사사례 검색)
  EMBED_ENDPOINT: "http://ollama:11434"
  QDRANT_ENDPOINT: "http://qdrant:6333"
