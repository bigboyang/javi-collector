apiVersion: v1
kind: Secret
metadata:
  name: collector-secret
  namespace: apm
type: Opaque
stringData:
  # ClickHouse 비밀번호 (clickhouse-secret과 동일하게 유지)
  CLICKHOUSE_PASSWORD: ""

  # Alert 설정 (선택 사항)
  ALERT_WEBHOOK_URL: ""
  ALERT_SLACK_WEBHOOK_URL: ""

  # RAG 설정 (선택 사항)
  EMBED_ENDPOINT: "http://ollama:11434"
  QDRANT_ENDPOINT: "http://qdrant:6333"
