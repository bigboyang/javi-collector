apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: javi-collector
  namespace: apm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: javi-collector
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 10
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # 급격한 스케일다운 방지
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
