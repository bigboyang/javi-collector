apiVersion: v1
kind: Service
metadata:
  name: javi-collector
  namespace: apm
  labels:
    app: javi-collector
spec:
  selector:
    app: javi-collector
  ports:
    - name: grpc-otlp
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: http-otlp
      port: 4318
      targetPort: 4318
      protocol: TCP
  type: ClusterIP
---
# 외부 Agent(host JVM 등)에서 직접 전송하는 경우 NodePort 사용
# minikube IP(192.168.49.2):30317 gRPC  |  :30318 HTTP
apiVersion: v1
kind: Service
metadata:
  name: javi-collector-external
  namespace: apm
  labels:
    app: javi-collector
spec:
  selector:
    app: javi-collector
  ports:
    - name: grpc-otlp
      port: 4317
      targetPort: 4317
      nodePort: 30317
      protocol: TCP
    - name: http-otlp
      port: 4318
      targetPort: 4318
      nodePort: 30318
      protocol: TCP
  type: NodePort
