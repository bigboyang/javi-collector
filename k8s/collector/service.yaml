apiVersion: v1
kind: Service
metadata:
  name: javi-collector
  namespace: apm
  labels:
    app: javi-collector
spec:
  selector:
    app: javi-collector
  ports:
    - name: grpc-otlp
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: http-otlp
      port: 4318
      targetPort: 4318
      protocol: TCP
  type: ClusterIP
---
# 외부 Agent에서 직접 전송하는 경우: LoadBalancer 또는 NodePort 사용
# 클러스터 외부 트래픽이 없다면 이 Service는 삭제해도 됩니다.
apiVersion: v1
kind: Service
metadata:
  name: javi-collector-external
  namespace: apm
  labels:
    app: javi-collector
spec:
  selector:
    app: javi-collector
  ports:
    - name: grpc-otlp
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: http-otlp
      port: 4318
      targetPort: 4318
      protocol: TCP
  type: LoadBalancer
