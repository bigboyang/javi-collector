apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: apm
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      terminationGracePeriodSeconds: 30

      # 모델 사전 다운로드 (nomic-embed-text + qwen2.5:1.5b)
      initContainers:
        - name: pull-models
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              ollama serve &
              SERVER_PID=$!
              sleep 5
              ollama pull nomic-embed-text
              ollama pull qwen2.5:1.5b
              kill $SERVER_PID
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: ollama-data
              mountPath: /models

      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: ollama-data
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
