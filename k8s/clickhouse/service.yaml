apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: apm
  labels:
    app: clickhouse
spec:
  # Headless service — StatefulSet Pod DNS: clickhouse-0.clickhouse.apm.svc.cluster.local
  clusterIP: None
  selector:
    app: clickhouse
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
---
# ClusterIP alias for collector → clickhouse:9000
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-svc
  namespace: apm
  labels:
    app: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
---
# NodePort — 클러스터 외부(로컬 개발, docker-compose 등)에서 접근용
# native: localhost:30900  |  http: localhost:30123
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-nodeport
  namespace: apm
  labels:
    app: clickhouse
spec:
  type: NodePort
  selector:
    app: clickhouse
  ports:
    - name: native
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: http
      port: 8123
      targetPort: 8123
      nodePort: 30123
