apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-users-config
  namespace: apm
data:
  users_override.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <users>
        <default>
          <!-- 비밀번호는 clickhouse-secret Secret의 password 필드와 동일하게 유지 -->
          <!-- 운영: SHA256_HEX 해시 방식 권장 (평문 노출 최소화) -->
          <password>changeme-use-sealed-secrets</password>
          <!-- 운영환경에서는 내부 서브넷으로 제한하세요 (예: 10.0.0.0/8) -->
          <networks>
            <ip>10.0.0.0/8</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
        </default>
      </users>
    </clickhouse>
