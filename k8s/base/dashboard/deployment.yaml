apiVersion: apps/v1
kind: Deployment
metadata:
  name: javi-dashboard
  namespace: apm
  labels:
    app: javi-dashboard
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: javi-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: javi-dashboard
        component: dashboard
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/health"
    spec:
      initContainers:
        - name: wait-for-clickhouse
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z clickhouse-svc 9000; do
                echo "Waiting for ClickHouse..."; sleep 2
              done
        - name: wait-for-forecast
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z javi-forecast 8080; do
                echo "Waiting for javi-forecast..."; sleep 3
              done
      containers:
        - name: javi-dashboard
          image: javi-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8080"

            # ClickHouse — native TCP(9000) for go-clickhouse
            - name: CH_ADDR
              value: "clickhouse-svc:9000"
            - name: CH_DATABASE
              value: "apm"
            - name: CH_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: username
            - name: CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: password

            # Upstream services
            - name: FORECAST_URL
              value: "http://javi-forecast:8080"
            - name: COLLECTOR_URL
              value: "http://javi-collector:4318"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      terminationGracePeriodSeconds: 30
