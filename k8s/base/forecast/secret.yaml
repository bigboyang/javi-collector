apiVersion: v1
kind: Secret
metadata:
  name: forecast-secret
  namespace: apm
type: Opaque
stringData:
  # Slack Incoming Webhook URL (선택)
  slack_webhook_url: ""

  # Anthropic API Key — RAG_ENABLED=true 시 필요
  # 운영: kubectl create secret generic forecast-secret --from-literal=anthropic_api_key=sk-ant-...
  anthropic_api_key: ""

  # Redis URL — 멀티 레플리카 FeatureStore 공유 시 필요
  # 예: redis://redis-svc:6379
  redis_url: ""
