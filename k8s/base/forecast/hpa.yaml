apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: javi-forecast
  namespace: apm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: javi-forecast
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
