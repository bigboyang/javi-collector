apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: apm
data:
  GRPC_PORT: "4317"
  HTTP_PORT: "4318"
  CLICKHOUSE_ADDR: "clickhouse-svc:9000"
  CLICKHOUSE_DB: "apm"
  CLICKHOUSE_USER: "default"

  # 배치 설정
  BATCH_SIZE: "1000"
  FLUSH_INTERVAL: "2s"
  CHANNEL_BUFFER_SIZE: "8192"
  MEMORY_BUFFER_SIZE: "10000"
  FLUSH_WORKERS: "4"

  # 보관 기간
  RETENTION_DAYS: "30"

  # DLQ — PVC에 마운트된 경로
  DLQ_DIR: "/data/dlq"
  DLQ_RETENTION_DAYS: "7"
  DLQ_REPLAY_INTERVAL: "5m"

  # 백업
  BACKUP_ENABLED: "true"
  BACKUP_DIR: "/data/backup"

  # Circuit Breaker
  CB_FAILURE_THRESHOLD: "5"
  CB_COOLDOWN: "60s"

  # AIOps
  BASELINE_ENABLED: "true"
  BASELINE_INTERVAL: "1h"
  ANOMALY_ENABLED: "true"
  ANOMALY_INTERVAL: "1m"
  ANOMALY_TRAIN_INTERVAL: "6h"
  ANOMALY_N_TREES: "100"
  ANOMALY_MAX_SAMPLES: "256"
  ANOMALY_Z_WARN: "2.0"
  ANOMALY_Z_CRITICAL: "3.0"
  ANOMALY_IF_THRESHOLD: "0.65"
  RCA_ENABLED: "true"
  RCA_INTERVAL: "2m"

  # Alerter
  ALERT_INTERVAL: "1m"
  ALERT_MIN_SEVERITY: "warning"

  # Tail Sampling (멀티 replica 시 아래 SELF_URL / PEER_URLS를 설정하세요)
  SAMPLING_ENABLED: "false"
